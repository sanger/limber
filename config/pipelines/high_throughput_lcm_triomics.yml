---
# Pipeline configuration for EMSeq
LCM Triomics EMSeq:
  pipeline_group: LCM Triomics WGS and EMSeq
  filters:
    request_type_key: limber_lcm_triomics_emseq
    library_type: emSEQ
  library_pass: LCMT EM PCR XP
  relationships:
    LCMT Lysate: LCMT DNA Frag
    LCMT DNA Frag: LCMT DNA End Prep
    LCMT DNA End Prep: LCMT DNA Adp Lig
    LCMT DNA Adp Lig: LCMT EM TET2 Ox
    LCMT EM TET2 Ox: LCMT EM TET2 Stop
    LCMT EM TET2 Stop: LCMT EM NaOH Denat
    LCMT EM NaOH Denat: LCMT EM APOBEC Deam
    LCMT EM APOBEC Deam: LCMT EM Lib PCR
    LCMT EM Lib PCR: LCMT EM PCR XP

LCM Triomics EMSeq Custom Pooling:
  pipeline_group: LCM Triomics WGS and EMSeq
  filters:
    request_type_key: limber_lcm_triomics_emseq
    state: passed
  relationships:
    LCMT EM PCR XP: LCMT EM Pool XP
    LCMT EM Pool XP: LCMT EM Pool XP Norm

# Pipeline configuration for WGS
LCM Triomics WGS:
  pipeline_group: LCM Triomics WGS and EMSeq
  filters:
    request_type_key: limber_lcm_triomics_wgs
    library_type: LCMB
  library_pass: LCMT DNA PCR XP
  relationships:
    LCMT DNA Adp Lig: LCMT DNA Lib PCR
    LCMT DNA Lib PCR: LCMT DNA PCR XP
LCM Triomics WGS Custom Pooling:
  pipeline_group: LCM Triomics WGS and EMSeq
  filters:
    request_type_key: limber_lcm_triomics_wgs
    state: passed
  relationships:
    LCMT DNA PCR XP: LCMT DNA Pool XP
    LCMT DNA Pool XP: LCMT DNA Pool XP Norm

# Pipeline configuration for RNA-seq
LCM Triomics RNA-seq:
  pipeline_group: LCM Triomics RNA-seq
  filters:
    request_type_key: limber_lcm_triomics_rnaseq
    library_type: Combined LCM RNA
  library_pass: LCMT cDNA Lib PCR
  relationships:
    LCMT Lysate: LCMT RNA OdT Beads
    LCMT RNA OdT Beads: LCMT RNA Denat/Hyb
    LCMT RNA Denat/Hyb: LCMT RNA RT
    LCMT RNA RT: LCMT RNA Preamp
    LCMT RNA Preamp: LCMT cDNA Reserve
    LCMT cDNA Reserve: LCMT cDNA Frag/ER
    LCMT cDNA Frag/ER: LCMT cDNA ADP Lig
    LCMT cDNA ADP Lig: LCMT cDNA Lib PCR
    LCMT cDNA Lib PCR: LCMT cDNA Lib PCR XP

LCM Triomics RNA-seq Custom Pooling:
  pipeline_group: LCM Triomics RNA-seq
  filters:
    request_type_key: limber_lcm_triomics_rnaseq
    state: passed
  relationships:
    LCMT cDNA Lib PCR XP: LCMT cDNA Pool XP
    LCMT cDNA Pool XP: LCMT cDNA Pool XP Norm
